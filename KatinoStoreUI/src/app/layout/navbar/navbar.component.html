<nav class="katino-navbar">
  <div class="navbar-inner container-fluid">
    <a routerLink="/" class="navbar-brand">
      <img src="assets/images/logo.webp" alt="KATINO" class="brand-logo" />
      <span class="brand-name">KATINO</span>
    </a>

    <ul class="nav-links d-none d-lg-flex">
      <li>
        <a
          routerLink="/main"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="nav-link"
        >
          {{ "navbar.home" | translate }}
        </a>
      </li>
      <li>
        <a
          routerLink="/catalog"
          routerLinkActive="active"
          class="nav-link"
        >
          {{ "navbar.catalog" | translate }}
        </a>
      </li>
    </ul>

    <div class="navbar-right d-none d-lg-flex">
      <div class="search-box">
        <mat-icon class="search-icon" (click)="onSearch(desktopSearch.value)">search</mat-icon>
        <input
          #desktopSearch
          type="text"
          class="search-input"
          [placeholder]="'navbar.searchPlaceholder' | translate"
          [value]="searchQuery"
          (input)="onInput(desktopSearch.value)"
          (keyup.enter)="onSearch(desktopSearch.value)"
        />
      </div>

      <div class="lang-selector">
        <button
          class="lang-btn"
          [class.active]="currentLanguage === uaLang"
          (click)="setLanguage(uaLang)"
        >
          {{ "languageSelection.ua" | translate }}
        </button>
        <span class="lang-divider">|</span>
        <button
          class="lang-btn"
          [class.active]="currentLanguage === enLang"
          (click)="setLanguage(enLang)"
        >
          {{ "languageSelection.en" | translate }}
        </button>
      </div>
    </div>

    <button
      class="mobile-toggle d-flex d-lg-none"
      (click)="toggleMobileMenu()"
      [attr.aria-label]="'navbar.toggleMenu' | translate"
      [attr.aria-expanded]="mobileMenuOpen"
    >
      <mat-icon>{{ mobileMenuOpen ? "close" : "menu" }}</mat-icon>
    </button>
  </div>

  <div class="mobile-menu" [class.open]="mobileMenuOpen">
    <div class="mobile-search">
      <mat-icon class="search-icon" (click)="onSearch(mobileSearch.value)">search</mat-icon>
      <input
        #mobileSearch
        type="text"
        class="search-input"
        [placeholder]="'navbar.searchPlaceholder' | translate"
        [value]="searchQuery"
        (input)="onInput(mobileSearch.value)"
        (keyup.enter)="onSearch(mobileSearch.value)"
      />
    </div>

    <ul class="mobile-nav-links">
      <li>
        <a
          routerLink="/main"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="mobile-nav-link"
          (click)="mobileMenuOpen = false"
        >
          {{ "navbar.home" | translate }}
        </a>
      </li>
      <li>
        <a
          routerLink="/catalog"
          routerLinkActive="active"
          class="mobile-nav-link"
          (click)="mobileMenuOpen = false"
        >
          {{ "navbar.catalog" | translate }}
        </a>
      </li>
    </ul>

    <div class="mobile-lang-selector">
      <button
        class="lang-btn"
        [class.active]="currentLanguage === uaLang"
        (click)="setLanguage(uaLang)"
      >
        {{ "languageSelection.ua" | translate }}
      </button>
      <span class="lang-divider">|</span>
      <button
        class="lang-btn"
        [class.active]="currentLanguage === enLang"
        (click)="setLanguage(enLang)"
      >
        {{ "languageSelection.en" | translate }}
      </button>
    </div>
  </div>
</nav>

<div class="content-wrapper">
  <router-outlet></router-outlet>
</div>

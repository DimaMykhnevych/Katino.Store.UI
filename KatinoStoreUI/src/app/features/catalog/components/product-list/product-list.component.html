<div class="product-list-container container">
  <div *ngIf="isLoading" class="initial-loading">
    <mat-progress-spinner mode="indeterminate" [diameter]="52"></mat-progress-spinner>
  </div>

  <div class="products-wrapper" *ngIf="!isLoading" [class.reloading]="isReloading">
    <div class="reload-overlay" *ngIf="isReloading">
      <mat-progress-spinner mode="indeterminate" [diameter]="48"></mat-progress-spinner>
    </div>

    <div *ngIf="products.length === 0" class="no-results">
      {{ 'products.noResults' | translate }}
    </div>

    <div
      *ngIf="products.length > 0"
      class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-5 g-2 g-sm-3"
    >
      <div class="col" *ngFor="let product of products">
        <app-product-card [product]="product"></app-product-card>
      </div>
    </div>

    <app-pagination
      [totalPages]="totalPages"
      [pageIndex]="pageIndex"
      (pageChange)="onPageChange($event)"
    ></app-pagination>
  </div>
</div>
